<header class="vui_header">
  <div class="vui_header_inner">
    <div class="vui_dashboard_logo">
      <a><img src="assets/images/veridian-urban-index.png" alt="" /></a>
    </div>
    <div class="user_detail">
      <ul>
        <li>
          <a
            style="cursor: pointer"
            (click)="opendialog(); $event.preventDefault()"
          >
            <figure class="profile_pic">
              <img
                [src]="userInfoForUpdate?.profileImagePath ? urlBase+userInfoForUpdate?.profileImagePath : 'assets/images/default-profile.png'"
                [alt]="'Profile Image'"
                (error)="onImgError($event)"
              />
              <span class="edit_img">
                <svg width="94" height="94" viewBox="0 0 94 94" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect width="94" height="94" rx="47" fill="#397B69"/>

            </svg>

              </span>
            </figure>
          </a>
        </li>
        <li class="profile_name_div">
          <span class="user_name">{{ userInfoForUpdate?.fullName }}</span>
          <span class="user_role">{{ showRoleBasedInfor() }}</span>
        </li>

        <li class="menu_toggle" style="display: none">
          <div
            class="menu-icon"
            [class.toggle_nav]="menuOpen"
            (click)="toggleMenu()"
          >
            <span></span>
            <span></span>
            <span></span>
          </div>
        </li>
      </ul>
    </div>
  </div>
</header>
<ng-container *ngIf="isOpendialog">
  <div
    class="modal fade modal_design"
    id="exampleModal"
    tabindex="-1"
    aria-labelledby="exampleModalLabel"
    aria-hidden=""
  >
    <app-update-profile
      [userinfo]="userInfoForUpdate"
      (updateUserEvent)="updateUserEvent($event)"
      (closeModelEvent)="closeModal()"
      [loading]="loading"
    ></app-update-profile>
  </div>
</ng-container>
