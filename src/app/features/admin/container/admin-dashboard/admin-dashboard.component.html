	<div class="city_piller">
		<div class="row justify-content-between align-items-end">
			<div class="col-md-auto">
				<div class="input_field">
					<label>Select City *</label>


					<ng-select [items]="cities"
						[searchable]="true"
						[placeholder]="selectedCities == '' ? 'Select City' : ''"
						[(ngModel)]="selectedCities"
						(change)="getCityPillarHistory()"
						bindValue="cityID"
						bindLabel="cityName"
						class="form-control analyst_multi_select">
						<ng-template ng-label-tmp
							let-item="item "
							class="select_item">
							{{ item.cityName }}
						</ng-template>


						<ng-template ng-option-tmp
							let-item="item">
							{{ item.cityName }}, {{ item.state }}
						</ng-template>
					</ng-select>
				</div>
			</div>
			<div class="col-md-auto">
				<div class="input_field">
					<label>Select Year*</label>
					<select [(ngModel)]="selectedYear"
						(change)="yearChanged()"
						name="selectedYear"
						class="form-control">
						<option *ngFor="let year of commonService.applicateYears"
							[value]="year">
							{{ year }}
						</option>
					</select>
					<span class="calender_icon">
						<svg xmlns="http://www.w3.org/2000/svg"
							width="20"
							height="20"
							viewBox="0 0 24 24"
							fill="none"
							stroke="#12352f"
							stroke-width="2"
							stroke-linecap="round"
							stroke-linejoin="round"
							class="icon icon-tabler icons-tabler-outline icon-tabler-calendar">
							<path stroke="none"
								d="M0 0h24v24H0z"
								fill="none"></path>
							<path d="M4 7a2 2 0 0 1 2 -2h12a2 2 0 0 1 2 2v12a2 2 0 0 1 -2 2h-12a2 2 0 0 1 -2 -2v-12z"></path>
							<path d="M16 3v4"></path>
							<path d="M8 3v4"></path>
							<path d="M4 11h16"></path>
							<path d="M11 15h1"></path>
							<path d="M12 15v3"></path>
						</svg>
					</span>
				</div>
			</div>
			<div class="col-md d-flex justify-content-end gap-2 mb-3">
				<button *ngIf="cityQuestionHistoryReponse?.pillars?.length"
					[matTooltip]=" 'Go to the AI analysis page to review detailed city insights and scores'"
					(click)="goToCityAnalysis()"
					class="common_button">
					AI City Insights
					<svg xmlns="http://www.w3.org/2000/svg"
						width="20"
						height="20"
						fill="currentColor"
						class="bi bi-box-arrow-up-right"
						viewBox="0 0 16 16">
						<path fill-rule="evenodd"
							d="M8.636 3.5a.5.5 0 0 0-.5-.5H1.5A1.5 1.5 0 0 0 0 4.5v10A1.5 1.5 0 0 0 1.5 16h10a1.5 1.5 0 0 0 1.5-1.5V7.864a.5.5 0 0 0-1 0V14.5a.5.5 0 0 1-.5.5h-10a.5.5 0 0 1-.5-.5v-10a.5.5 0 0 1 .5-.5h6.636a.5.5 0 0 0 .5-.5"></path>
						<path fill-rule="evenodd"
							d="M16 .5a.5.5 0 0 0-.5-.5h-5a.5.5 0 0 0 0 1h3.793L6.146 9.146a.5.5 0 1 0 .708.708L15 1.707V5.5a.5.5 0 0 0 1 0z"></path>
					</svg>
				</button>

				<button *ngIf="cityQuestionHistoryReponse?.pillars?.length"
				    [matTooltip]=" 'Export pillar details'"
					(click)="ExportCityPillar()"
					class="common_button d-flex align-items-center">
					Export
					<svg xmlns="http://www.w3.org/2000/svg"
						width="20"
						height="20"
						fill="#ffffff"
						viewBox="0 0 256 256"
						class="ms-1">

					</svg>
				</button>
			</div>
		</div>


		<div *ngIf="chartPillarOptions && chartPillarOptions?.series"
			id="chartPillar"
			tyle="width:100%; height:500px;">
			<apx-chart [series]="chartPillarOptions.series!"
				[chart]="chartPillarOptions.chart!"
				[xaxis]="chartPillarOptions.xaxis!"
				[yaxis]="chartPillarOptions.yaxis!"
				[colors]="chartPillarOptions.colors!"
				[tooltip]="chartPillarOptions.tooltip!"
				[plotOptions]="chartPillarOptions.plotOptions!"
				[legend]="chartPillarOptions.legend!"
				[fill]="chartPillarOptions.fill!"
				[states]="chartPillarOptions.states!"
				[dataLabels]="chartPillarOptions.dataLabels!"
				[stroke]="chartPillarOptions.stroke!"
				[markers]="chartPillarOptions.markers!"
				[grid]="chartPillarOptions.grid!"
				class="cus_chart_right"></apx-chart>
		</div>
	</div>


	<div *ngIf="chartOptions?.series"
		class="apx_chart_new">
		<div class="card_heading">
			<h3>City Overview</h3>
		</div>
		<apx-chart [series]="chartOptions.series!"
			[chart]="chartOptions.chart!"
			[plotOptions]="chartOptions.plotOptions!"
			[labels]="chartOptions.labels!"
			[legend]="chartOptions.legend!"
			[colors]="chartOptions.colors!">
		</apx-chart>
	</div>
</ng-container>


<div *ngIf="isLoader"
	class="loader_main">
	<div class="loader"></div>
</div>
