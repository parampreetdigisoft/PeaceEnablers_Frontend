<div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
        <div class="modal-body">
            <button type="button" (click)="closeModel()" class="btn-close" data-bs-dismiss="modal"
                aria-label="Close"></button>
            <div class="row">
                <div class="col-md">
                    <h4 class="modal_head">{{ city ? 'Update' : 'Add' }} City</h4>
                    <p class="modal_sub_head">Enter The details and marked</p>
                </div>
                <div class="col-md-auto">
                    <img [src]="city?.image ? urlBase+city?.image : 'assets/images/default-profile.png'" class="pp_pic"
                        (error)="onImgError($event)" [alt]="'Profile Image'" />
                </div>
            </div>
            <div class="modal_tabs">
                <ul class="nav nav-pills" id="pills-tab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="pills-home-tab" data-bs-toggle="pill"
                            data-bs-target="#pills-home" type="button" role="tab" aria-controls="pills-home"
                            aria-selected="true">{{ city ? 'Update' : 'Add' }} Single</button>
                    </li>
                    <li class="nav-item" role="presentation" *ngIf="!city">
                        <button class="nav-link" id="pills-profile-tab" data-bs-toggle="pill"
                            data-bs-target="#pills-profile" type="button" role="tab" aria-controls="pills-profile"
                            aria-selected="false">Bulk Import</button>
                    </li>
                </ul>

                <div class="tab-content" id="pills-tabContent">
                    <!-- Single Add / Update -->
                    <div class="tab-pane fade show active" id="pills-home">
                        <form [formGroup]="cityForm" (ngSubmit)="onSubmit()">
                            <div class="row">
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter City *</label>
                                        <input type="text" formControlName="cityName" appAlphaOnly
                                            placeholder="Enter City" class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('cityName')?.invalid && (cityForm.get('cityName')?.touched || isSubmitted)">
                                            City name is required.
                                        </div>
                                    </div>
                                </div>

                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter State *</label>
                                        <input type="text" appAlphaOnly formControlName="state"
                                            placeholder="Enter State" class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('state')?.invalid && (cityForm.get('state')?.touched || isSubmitted)">
                                            State is required.
                                        </div>
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter Region *</label>
                                        <input type="text" formControlName="region" placeholder="Enter Region"
                                            class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('region')?.invalid && (cityForm.get('region')?.touched || isSubmitted)">
                                            Region is required.
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter country *</label>
                                        <input type="text" appAlphSomeSepecial formControlName="country"
                                            placeholder="Enter country" class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('country')?.invalid && (cityForm.get('country')?.touched || isSubmitted)">
                                            Country is required.
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter postalCode *</label>
                                        <input type="text" formControlName="postalCode" placeholder="Enter postalCode"
                                            class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('postalCode')?.invalid && (cityForm.get('postalCode')?.touched || isSubmitted)">
                                            Postal Code is required.
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter Latitude *</label>
                                        <input type="text" formControlName="latitude" placeholder="Enter latitude"
                                            class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('latitude')?.invalid && (cityForm.get('latitude')?.touched || isSubmitted)">
                                            Latitude is required.
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col">
                                    <div class="input_field">
                                        <label>Enter Longitude *</label>
                                        <input type="text" formControlName="longitude" placeholder="Enter longitude"
                                            class="form-control">
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('longitude')?.invalid && (cityForm.get('longitude')?.touched || isSubmitted)">
                                            Longitude is required.
                                        </div>
                                    </div>
                                </div>
                                <div class="col">
                                    <div class="input_field">
                                        <label>Upload Image </label>
                                        <input type="file" (change)="onFileChange($event)" class="form-control"
                                            accept="image/*" formControlName="imageFile" />
                                        <div class="error-msg"
                                            *ngIf="cityForm.get('imageFile')?.invalid && (cityForm.get('imageFile')?.touched || isSubmitted)">
                                            Image is required.
                                        </div>
                                    </div>
                                </div>
                            </div>


                            <button type="submit" class="common_button w-100 mt-4">{{ city ? 'Update' : 'Save'}}
                                <span *ngIf="loading" class="spinner-border spinner-border-sm ms-2"></span></button>
                        </form>
                    </div>

                    <!-- Bulk Import -->
                    <div class="tab-pane fade" id="pills-profile" role="tabpanel" aria-labelledby="pills-profile-tab"
                        tabindex="0" *ngIf="!city">
                        <div class="input_field">
                            <label>
                                Upload Excel File *
                                <a href="javascript:void(0)" (click)="downloadTemplate()" class="ms-2 text-primary"
                                    style="text-decoration: underline; cursor: pointer;">
                                    Download Template
                                </a>
                            </label>
                            <input #fileInput type="file" accept=".xlsx, .xls" (change)="handleFileImport($event)"
                                class="form-control">
                        </div>
                        <div class="wrong_upload_alert">
                            <p>{{this.alertMsg}}</p>
                        </div>
                        <div class="d-flex justify-content-end mt-3">
                            <button type="button" class="common_button" [disabled]="!this.bulkImportData?.length"
                                (click)="bulkImportCity()">
                                Import
                                <span *ngIf="loading" class="spinner-border spinner-border-sm ms-2"></span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
