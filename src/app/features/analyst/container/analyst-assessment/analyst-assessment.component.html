<div class="heading_area">
  <div class="row justify-content-between align-items-center gap-2 custom_gap">
    <div class="col">
      <h3 class="page_head">Assesment</h3>
    </div>

      <div class="header_btns">

            <li>
              <a class="dropdown-item" href="javascript:void(0)" (click)="downloadQuestions('pdf')">
                Download PDF

      </div>
    </div>
  </div>
</div>

<div class="body_faq">
  <div class="body_faq_inner">
    <div class="faq_sidebar">
      <div class="faq_sidebar_inner">
        <div class="faq_sidebar_item" *ngFor="let piller of pillars; let i = index"
          [class.active]="piller.displayOrder <= pillarDisplayOrder">
          <div class="faq_sidebar_item_inner"
            (click)="selectedPillar?.displayOrder == piller.displayOrder ? $event.stopPropagation() :pillarChanged(piller)"
            [ngClass]="selectedPillar?.displayOrder == piller.displayOrder ? 'current-active' : ''">
            <span class="faq_inner_svg">
              <img [src]="urlBase + '/' + piller.imagePath" [alt]="'No image found'" />
            </span>
            <p>{{ piller.pillarName }}</p>
          </div>
        </div>
      </div>
    </div>

    <div class="faq_main_section" #scrollContainer>
      <form [formGroup]="form">
        <div class="tabs_discrp">
          <div class="tabs_discrp_inner" [innerHTML]="decodeHtml(pillerQuestions?.description)"></div>
        </div>
        <div class="faq_main_section_inner" formArrayName="questions"
          *ngFor="let group of questionsArray.controls; let i = index">
          <div class="faq_main_item" [formGroupName]="i">
            <div class="faq_main_item_inner">
              <p>{{ i + 1 }}. {{ questions[i].questionText }}</p>

              <select class="form-select faq_select" formControlName="questionOptionID"
                (change)="onOptionChange($event, i)">
                <option value="">Select option</option>
                <option *ngFor="let o of questions[i].questionOptions" [value]="o.optionID">
                  {{ o.scoreValue != null ? o.scoreValue + " - " : "" }}
                  {{ o.optionText }}
                </option>
              </select>
              <div class="faqtextarea">
                <textarea class="form-control" formControlName="justification" rows="3" placeholder="Add Comment . . ."
                  (blur)="autoSaveSingleAssessemnt(i)"></textarea>
              </div>
              <div class="faqtextarea">
                <textarea class="form-control" formControlName="source" rows="3" placeholder="Add Source . . ."
                  (blur)="autoSaveSingleAssessemnt(i)"></textarea>
              </div>
            </div>
          </div>
        </div>

        <div class="next_btn" [class.loading-bottom]="isLoader">
          <button type="button" data-bs-toggle="modal" data-bs-target="#confirmModal" style="cursor: pointer"
            class="common_button" [disabled]="!this.selectedUserCityMappingID || this.selectedUserCityMappingID == 0">
            {{pillerQuestions?.displayOrder == 14 ? 'Submit' :'Save & NEXT' }}
          </button>
        </div>
      </form>

      <div *ngIf="isLoader" class="loader_main">
        <div class="loader"></div>
      </div>
    </div>
  </div>
</div>

<app-file-upload-modal (fileUploaded)="handleFileUpload($event)"></app-file-upload-modal>

<app-prompt [title]="
    pillerQuestions?.displayOrder == 14 || isAssessementFinalized? 'Submit Pillar' : 'Save Pillar'
  " [message]="
    pillerQuestions?.displayOrder == 14 || isAssessementFinalized
      ? 'Are you sure you want to submit this city? After submission, changes can’t be made directly. To edit later, you’ll need to request it from the Admin.'
      : 'Are you sure you want to save this pillar?'
  " [confirmText]="pillerQuestions?.displayOrder == 14 || isAssessementFinalized ? 'Submit' : 'Save'"
  [cancelText]="'Cancel'" (confirm)="SaveAssessment()" (cancel)="isAssessementFinalized=false">
</app-prompt>

<app-prompt [title]="'Transfer AI Results'" [uniqueId]="'AiTransferResult'"
  [message]="'Are you sure you want to transfer ai results'" [confirmText]="'Yes'" [cancelText]="'Cancel'"
  (confirm)="aiResultTransfer()" (cancel)="isAssessementFinalized=false">
</app-prompt>
