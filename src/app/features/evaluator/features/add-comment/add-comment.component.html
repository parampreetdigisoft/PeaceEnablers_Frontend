<div class="modal-dialog modal-dialog-centered transfer_popup">
    <div class="modal-content">
        <div class="modal-body">

            <!-- Close -->
            <button type="button" class="btn-close close-btn" (click)="closeModel()" aria-label="Close">
            </button>

            <h4 class="modal_head">Add Comment on AI Research</h4>

            <form [formGroup]="commentForm" (ngSubmit)="submit()">

                <!-- City Info -->
                <div class="details_list" *ngIf="city">
                    <div>
                        <strong>City:</strong>
                        <span> {{ city.cityName }}, {{ city.state }} ({{ city.country }})</span>
                    </div>
                    <div>
                        <strong>evaluator Score:</strong>
                        <span> {{ city.evaluatorProgress }}</span>
                    </div>
                    <div>
                        <strong>Ai Score:</strong>
                        <span> {{ city.aiProgress }}</span>
                    </div>
                    <div>
                        <strong>discrepancy:</strong>
                        <span> {{ city.discrepancy }}</span>
                    </div>

                </div>

                <!-- Comment -->
                <div class="form-group mt-3">
                    <label class="form-label">Comment</label>
                    <textarea class="form-control" rows="4" placeholder="Add your comment here..."
                        formControlName="comment">
                    </textarea>

                    <!-- Validation -->
                    <div class="error" *ngIf="commentForm.get('comment')?.touched &&
                      commentForm.get('comment')?.invalid">
                        <small *ngIf="commentForm.get('comment')?.errors?.['required']">
                            Comment is required.
                        </small>
                        <small *ngIf="commentForm.get('comment')?.errors?.['minlength']">
                            Comment must be at least 10 characters.
                        </small>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" class="common_button w-100 mt-4" [disabled]="loading || commentForm.invalid">
                    Add Comment
                    <span *ngIf="loading" class="spinner-border spinner-border-sm ms-2">
                    </span>
                </button>

            </form>
        </div>
    </div>
</div>
